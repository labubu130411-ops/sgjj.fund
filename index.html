    <style>
        /* 字体设置：英文 SF Pro Display，中文楷体 */
        @import url('https://fonts.cdnfonts.com/css/sf-pro-display');
        
        :root {
            /* 浅色模式 / 浅蓝色调 Material You + iOS */
            --bg-gradient: linear-gradient(135deg, #e0f2fe, #bae6fd, #f0f9ff);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #0f172a;
            --text-sec: #475569;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --expense: #ef4444;
            --income: #10b981;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --radius: 24px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* 深色模式自动切换 */
                --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b, #020617);
                --glass-bg: rgba(30, 41, 59, 0.6);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #f8fafc;
                --text-sec: #cbd5e1;
                --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            }
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b, #020617);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-sec: #cbd5e1;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', 'KaiTi', '楷体', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* Glassmorphism 核心类 */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .glass:hover {
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }

        /* 隐藏和显示 */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 动态岛 (Dynamic Island) --- */
        #dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #000;
            color: #fff;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #dynamic-island.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            top: 30px;
        }

        /* --- 登录页 --- */
        #login-view {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 90%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-card h1 { font-size: 28px; margin-bottom: 10px; font-weight: 700; }
        .login-card p { color: var(--text-sec); margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.3);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }
        .dark-mode input, @media(prefers-color-scheme: dark){ input { background: rgba(0,0,0,0.2); } }
        input:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* 液态按钮 + Material Ripple */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
